name: astrostar_mobile
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  table_calendar: ^3.0.9
  google_fonts: ^4.0.3
  http: ^1.2.0
  flutter_bloc: ^8.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter_icons:
  android: true
  ios: true
  image_path: "lib/assets/icon_white.png"

flutter:
  uses-material-design: true
  assets:
    - lib/assets/astrostar.png
    - lib/assets/logo.png

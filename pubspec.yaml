name: astrostar_mobile
description: "A new Flutter project."
publish_to: "none"
version: 0.1.0

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  table_calendar: ^3.0.9
  google_fonts: ^8.0.2
  http: ^1.2.0
  flutter_bloc: ^8.1.3
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.2.2
  intl: ^0.20.2
  equatable: ^2.0.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: "^0.13.1"

flutter_icons:
  android: true
  ios: true
  image_path: "lib/assets/icon_white.png"

flutter:
  uses-material-design: true
  assets:
    - lib/assets/astrostar.png

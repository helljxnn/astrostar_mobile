name: astrostar_mobile
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2
  table_calendar: ^3.2.0
  percent_indicator: ^4.2.3
  share_plus: ^12.0.0
  path_provider: ^2.1.4
  excel: ^4.0.6
  google_fonts: ^6.2.1
  pdf: ^3.11.0
  printing: ^5.13.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter_icons:
  android: true
  ios: true
  image_path: "lib/assets/icon_white.png"

flutter:
  uses-material-design: true
  assets:
    - lib/assets/astrostar.png
    - lib/assets/logo.png
